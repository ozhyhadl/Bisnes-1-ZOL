    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What exactly is a Claude skill?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A SKILL.md file you add to Claude. It contains the full workflow for a specific task — the questions to ask you, the framework to apply, and the output format. Example: the SaaS Agreement skill asks about your pricing tiers, liability caps, and key clauses, then outputs a ready-to-sign contract."
          }
        },
        {
          "@type": "Question",
          "name": "Where can I use these skills?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Anywhere Claude runs — Claude.ai, Claude Code, and Cowork. On the web, enable them in Customize > Skills and Claude uses them automatically. In Claude Code, drop them in your skills folder and invoke them with /skill-name."
          }
        },
        {
          "@type": "Question",
          "name": "How do I install the skills?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You'll get a download link after purchase with all the skill folders and a quick-start guide. For Claude.ai, upload them in Customize > Skills. For Claude Code, drop them into your ~/.claude/skills/ folder. Takes about 2 minutes."
          }
        },
        {
          "@type": "Question",
          "name": "What is your refund policy?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Refund requests for one-time purchases may be submitted within 7 days of purchase. Refund requests are reviewed and processed through Paddle in accordance with Paddle's checkout terms, applicable consumer protection laws, and the circumstances of the order."
          }
        },
        {
          "@type": "Question",
          "name": "How is the bundle delivered?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Instantly. After purchase, you get immediate access to the full bundle of Claude skill files. Drop them into Claude, pick the skill you need, and start generating real deliverables for content, marketing, legal, finance, and operations the same day."
          }
        }
      ]
